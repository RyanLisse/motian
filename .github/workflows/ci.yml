name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "22"

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Risk Policy Gate
  # Classifies changed files and emits a risk tier so downstream
  # jobs can gate on it.
  # ────────────────────────────────────────────────────────────
  risk-policy-gate:
    name: Risk Policy Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      risk-tier: ${{ steps.gate.outputs.risk-tier }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute changed files
        id: changed
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          else
            CHANGED=$(git diff --name-only HEAD~1)
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run risk policy gate
        id: gate
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          echo "$CHANGED_FILES" \
            | pnpm tsx scripts/harness/risk-policy-gate.ts --json \
            | tee /tmp/gate-output.json
          TIER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/gate-output.json','utf8')).tier)")
          echo "risk-tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "Risk tier: $TIER"

  # ────────────────────────────────────────────────────────────
  # Job 2: Lint
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: risk-policy-gate
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # ────────────────────────────────────────────────────────────
  # Job 3: Typecheck
  # ────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: risk-policy-gate
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

  # ────────────────────────────────────────────────────────────
  # Job 4: Test
  # ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: risk-policy-gate
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Test with coverage
        run: |
          start=$(date +%s)
          pnpm test:coverage
          echo "::notice:: Test run completed in $(($(date +%s) - start))s"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # ────────────────────────────────────────────────────────────
  # Job 5: Browser Evidence (high-tier PRs only)
  # ────────────────────────────────────────────────────────────
  browser-evidence:
    name: Browser Evidence
    runs-on: ubuntu-latest
    needs: risk-policy-gate
    if: needs.risk-policy-gate.outputs.risk-tier == 'high'
    env:
      HOSTNAME: "0.0.0.0"
      PORT: "3001"
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start dev server
        run: |
          pnpm dev -- --hostname "${HOSTNAME}" --port "${PORT}" > /tmp/next-dev.log 2>&1 &
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Wait for server
        run: npx wait-on http://localhost:${{ env.PORT }} --timeout 180000

      - name: Capture browser evidence
        run: pnpm tsx scripts/harness/capture-browser-evidence.ts

      - name: Verify browser evidence
        run: pnpm tsx scripts/harness/verify-browser-evidence.ts

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: browser-evidence
          path: harness-evidence/
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # Job 6: Build
  # Runs only after lint, typecheck, and test all pass.
  # ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  # ────────────────────────────────────────────────────────────
  # Job 7: Symphony Gate
  # Single required status check for Symphony auto-merge.
  # Depends on all quality gates passing.
  # ────────────────────────────────────────────────────────────
  symphony-gate:
    name: Symphony Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - risk-policy-gate
      - lint
      - typecheck
      - test
      - build
    permissions:
      contents: read

    steps:
      - name: Check all gates passed
        run: |
          echo "Risk Policy Gate: ${{ needs.risk-policy-gate.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Typecheck: ${{ needs.typecheck.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"

          if [[ "${{ needs.risk-policy-gate.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::One or more quality gates failed"
            exit 1
          fi
          echo "All quality gates passed — safe for Symphony auto-merge"
