name: Symphony Agent

on:
  # Triggered by Linear webhook via GitHub Actions webhook
  repository_dispatch:
    types: [symphony-task]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      linear_issue_id:
        description: "Linear issue ID to process"
        required: true
        type: string
      linear_issue_slug:
        description: "Short slug for branch name"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "22"

jobs:
  symphony-agent:
    name: Symphony Agent Task
    runs-on: ubuntu-latest

    steps:
      - name: Parse event payload
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_ID="${{ github.event.inputs.linear_issue_id }}"
            SLUG="${{ github.event.inputs.linear_issue_slug }}"
          else
            ISSUE_ID="${{ github.event.client_payload.issue_id }}"
            SLUG="${{ github.event.client_payload.slug }}"
          fi
          BRANCH="symphony/${ISSUE_ID}-${SLUG}"
          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Processing Linear issue: $ISSUE_ID → branch: $BRANCH"

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Create Symphony branch
        run: |
          git checkout -b "${{ steps.parse.outputs.branch }}"
          echo "Created branch: ${{ steps.parse.outputs.branch }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify CI gates pass
        run: |
          pnpm lint
          pnpm exec tsc --noEmit
          pnpm test

      - name: Push branch and create PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "${{ steps.parse.outputs.branch }}"
          gh pr create \
            --title "symphony: ${{ steps.parse.outputs.slug }}" \
            --body "## Symphony Agent PR

          Resolves Linear issue: \`${{ steps.parse.outputs.issue_id }}\`

          ### Quality Gates
          - [x] Lint passed
          - [x] Typecheck passed
          - [x] Tests passed

          ---
          *Auto-generated by Symphony Agent*" \
            --base main \
            --head "${{ steps.parse.outputs.branch }}"
