# Runs Expect browser tests in CI on every pull request.
# Expect reads the PR diff, generates a test plan, and validates changes in a real browser.
name: Expect CI

on:
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "22"

jobs:
  expect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Expect uses this local app URL as the browser test target in CI.
      # Override by setting the EXPECT_BASE_URL repository variable.
      EXPECT_BASE_URL: ${{ vars.EXPECT_BASE_URL || 'http://localhost:3002' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit firefox

      # Expect runs against your dev server by default, not a production build or deployed preview.
      # To test a preview URL instead, set the EXPECT_BASE_URL repository variable to skip
      # local dev server startup entirely.
      - name: Start dev server
        if: ${{ !vars.EXPECT_BASE_URL }}
        run: pnpm dev &

      - name: Wait for dev server
        run: npx wait-on $EXPECT_BASE_URL --timeout 120000

      - name: Run expect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx expect-cli@latest --ci

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: expect-test-results
          path: .expect/sessions/
          if-no-files-found: ignore
