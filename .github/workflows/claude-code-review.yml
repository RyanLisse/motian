name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions: {}

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@220272d38887a1caed373da96a9ffdb0919c26cc # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'

      - name: Report Claude review outcome
        if: always()
        run: |
          echo "Claude review outcome: ${{ steps.claude-review.outcome }}"
          echo "Claude review conclusion: ${{ steps.claude-review.conclusion }}"

          {
            echo "## Claude Code Review"
            echo
            echo "- outcome: \\`${{ steps.claude-review.outcome }}\\`"
            echo "- conclusion: \\`${{ steps.claude-review.conclusion }}\\`"
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.claude-review.outcome }}" != "success" ]; then
            echo "::warning title=Claude Code Review degraded::anthropics/claude-code-action failed upstream without blocking PR CI. See the Claude review step logs and job summary for details."
          fi
